name: Dependabot Sync

on:
  push:
    branches: [main]
    paths: [dependabot.yml]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - rfidcheckout/rfid-architecture
          - rfidcheckout/rfid-totem-backend
          - rfidcheckout/rfid-totem-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Sync dependabot config
        env:
          GH_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          CONTENT=$(base64 -w0 dependabot.yml)

          SHA=$(gh api "repos/${{ matrix.repo }}/contents/.github/dependabot.yml" --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$SHA" ]; then
            gh api "repos/${{ matrix.repo }}/contents/.github/dependabot.yml" \
              -X PUT \
              --input - <<EOF
          {
            "message": "chore: sync dependabot config from .github",
            "content": "$CONTENT",
            "sha": "$SHA"
          }
          EOF
          else
            gh api "repos/${{ matrix.repo }}/contents/.github/dependabot.yml" \
              -X PUT \
              --input - <<EOF
          {
            "message": "chore: sync dependabot config from .github",
            "content": "$CONTENT"
          }
          EOF
          fi
