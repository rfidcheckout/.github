name: Dependabot Sync

on:
  push:
    branches: [main]
    paths: ["dependabot/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: rfidcheckout/rfid-totem-backend
            config: dependabot/backend.yml
          - repo: rfidcheckout/rfid-totem-frontend
            config: dependabot/frontend.yml
    steps:
      - uses: actions/checkout@v4

      - name: Sync dependabot config
        env:
          GH_TOKEN: ${{ secrets.RFID_GH_TOKEN }}
        run: |
          CONTENT=$(base64 -w0 "${{ matrix.config }}")

          SHA=$(gh api "repos/${{ matrix.repo }}/contents/.github/dependabot.yml" --jq '.sha' 2>/dev/null || echo "")

          ARGS=(-X PUT -f message="chore: sync dependabot config from .github" -f content="$CONTENT")
          if [ -n "$SHA" ]; then
            ARGS+=(-f sha="$SHA")
          fi

          gh api "repos/${{ matrix.repo }}/contents/.github/dependabot.yml" "${ARGS[@]}"
