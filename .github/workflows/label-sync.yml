name: Label Sync

on:
  push:
    branches: [main]
    paths: [labels.yml]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - rfidcheckout/rfid-architecture
          - rfidcheckout/rfid-totem-backend
          - rfidcheckout/rfid-totem-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels
        env:
          GH_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          yq -r '.[] | "\(.name)\t\(.color)\t\(.description)"' labels.yml | while IFS=$'\t' read -r name color desc; do
            gh label create "$name" --repo "${{ matrix.repo }}" --color "$color" --description "$desc" --force 2>&1 || true
          done
