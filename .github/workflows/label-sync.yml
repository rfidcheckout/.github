name: Label Sync

on:
  push:
    branches: [main]
    paths: [labels.yml]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - rfidcheckout/rfid-architecture
          - rfidcheckout/rfid-totem-backend
          - rfidcheckout/rfid-totem-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: labels.yml
          repository: ${{ matrix.repo }}
          delete-other-labels: false
          token: ${{ secrets.LABEL_SYNC_TOKEN }}
