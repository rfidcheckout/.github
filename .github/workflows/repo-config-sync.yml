name: Repo Config Sync

on:
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: rfidcheckout/rfid-architecture
            discussions: true
          - repo: rfidcheckout/rfid-totem-backend
            discussions: false
          - repo: rfidcheckout/rfid-totem-frontend
            discussions: false
    steps:
      - name: Configure repo settings
        env:
          GH_TOKEN: ${{ secrets.RFID_GH_TOKEN }}
        run: |
          gh api repos/${{ matrix.repo }} \
            -X PATCH \
            -f delete_branch_on_merge=true \
            -f allow_squash_merge=true \
            -f allow_merge_commit=false \
            -f allow_rebase_merge=true \
            -f squash_merge_commit_title=PR_TITLE \
            -f squash_merge_commit_message=PR_BODY \
            -F has_wiki=false \
            -F has_projects=true \
            -F has_discussions=${{ matrix.discussions }}
