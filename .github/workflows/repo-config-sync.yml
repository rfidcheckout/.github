name: Repo Config Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - rfidcheckout/rfid-architecture
          - rfidcheckout/rfid-totem-backend
          - rfidcheckout/rfid-totem-frontend
    steps:
      - name: Configure repo settings
        env:
          GH_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          gh api repos/${{ matrix.repo }} \
            -X PATCH \
            -f delete_branch_on_merge=true \
            -f allow_squash_merge=true \
            -f allow_merge_commit=false \
            -f allow_rebase_merge=false \
            -f squash_merge_commit_title=PR_TITLE \
            -f squash_merge_commit_message=PR_BODY

      - name: Configure branch protection
        env:
          GH_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          gh api repos/${{ matrix.repo }}/branches/main/protection \
            -X PUT \
            --input - <<'EOF'
          {
            "required_status_checks": null,
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1
            },
            "restrictions": null
          }
          EOF
