name: PR Lint

on:
  workflow_call:

jobs:
  title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|chore|docs|refactor|test)(\([A-Z]+-[0-9]+(/[0-9]+)*\))?: .+$'
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title must match: <type>[(ISSUE-ID)]: <description>"
            echo ""
            echo "  Types: feat, fix, chore, docs, refactor, test"
            echo "  Examples:"
            echo "    feat: add cart page"
            echo "    fix(BE-003): handle timeout on RFID read"
            echo "    feat(BE-017/018/019): multiple tickets in one PR"
            echo ""
            echo "  Got: $TITLE"
            exit 1
          fi
