# Fonte canônica de labels para todos os repos da org rfidcheckout.
# Alterações aqui são sincronizadas automaticamente via workflow label-sync.

# --- Tipo ---
- name: "type:bug"
  color: "EF4444"
  description: "Bugs e correções"
- name: "type:feature"
  color: "22C55E"
  description: "Features e funcionalidades"
- name: "type:chore"
  color: "6B7280"
  description: "Manutenção e infraestrutura"
- name: "type:docs"
  color: "3B82F6"
  description: "Documentação e padrões"
- name: "type:refactor"
  color: "F59E0B"
  description: "Refatoração de código"
- name: "type:epic"
  color: "8B5CF6"
  description: "Issues que são epics (parent issues)"

# --- Escopo ---
- name: "hardware"
  color: "D4C5F9"
  description: "Integração com hardware (RFID, trava, periféricos)"

# --- Prioridade ---
- name: "priority:low"
  color: "B0BEC5"
  description: "Prioridade baixa"
- name: "priority:normal"
  color: "64B5F6"
  description: "Prioridade normal"
- name: "priority:high"
  color: "FF9800"
  description: "Prioridade alta"
- name: "priority:critical"
  color: "D32F2F"
  description: "Prioridade crítica"

# --- Tamanho ---
- name: "size:XS"
  color: "E8F5E9"
  description: "Extra small (~1h)"
- name: "size:S"
  color: "C8E6C9"
  description: "Small (~meio dia)"
- name: "size:M"
  color: "A5D6A7"
  description: "Medium (~1 dia)"
- name: "size:L"
  color: "81C784"
  description: "Large (~2-3 dias)"
- name: "size:XL"
  color: "66BB6A"
  description: "Extra large (~1 semana)"
